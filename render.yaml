services:
  - type: web
    name: netra-academy
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false   # Paste your Neon connection string here in Render dashboard
      - key: GOOGLE_CLIENT_ID
        sync: false   # Your Google OAuth client ID
